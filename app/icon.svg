<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="Readorix">
  <title>Readorix</title>

  <!-- Dark-theme ground, matching the app background. The mark carries its own
       backdrop so it reads the same on light and dark browser chrome. -->
  <rect width="32" height="32" rx="7" fill="#1a1918"/>

  <!-- Voice: two arcs about (16,16). Radii 5.5 and 11 leave ~3u of clear space
       against a 2.4u stroke, so they stay distinct down to 16px. -->
  <g fill="none" stroke="#c8553d" stroke-width="2.4" stroke-linecap="round">
    <path d="M11.6 12.7 A5.5 5.5 0 0 1 20.4 12.7"/>
    <path d="M7.2 9.4 A11 11 0 0 1 24.8 9.4"/>
  </g>

  <!-- Open book, in the theme foreground cream -->
  <path d="M16 19.5 C13.2 17.6 9.4 17.1 5 17.5 L5 26 C9.4 25.6 13.2 26.1 16 27.5 C18.8 26.1 22.6 25.6 27 26 L27 17.5 C22.6 17.1 18.8 17.6 16 19.5 Z"
        fill="#f7f4ee"/>
  <path d="M16 19.5 L16 27.5" stroke="#1a1918" stroke-width="1.4" stroke-linecap="round"/>
</svg>
